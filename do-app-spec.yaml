name: opsgpt-backend
region: nyc

# =============================================================================
# Services
# =============================================================================
services:
  - name: api
    source_dir: /backend
    dockerfile_path: backend/dockerfile
    http_port: 8000
    instance_size_slug: basic-xxs    # upgrade to basic-xs for production
    instance_count: 1

    # Health check — DO App Platform uses this to verify the container is live
    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 3

    # Environment variables — set secret values in the DO dashboard, not here
    envs:
      - key: ENV
        value: "production"

      - key: LOG_LEVEL
        value: "INFO"

      # DATABASE_URL is injected automatically when you attach a Managed DB
      # (see databases section below). Remove this line if using that.
      - key: DATABASE_URL
        value: ""           # ← paste your DO Managed Postgres URL here
        type: SECRET

      - key: SECURITY_API_KEY
        value: ""           # ← set in DO dashboard
        type: SECRET

      - key: JWT_SECRET
        value: ""           # ← set in DO dashboard
        type: SECRET

      - key: CORS_ORIGINS
        value: "https://your-frontend.vercel.app"   # ← update with your Vercel URL

      # DigitalOcean Gradient™ AI — PRIMARY LLM
      - key: GRADIENT_API_KEY
        value: ""           # ← set in DO dashboard
        type: SECRET

      - key: GRADIENT_INFERENCE_URL
        value: "https://api.gradient.ai/v1"   # ← update with your endpoint URL

      - key: GRADIENT_MODEL
        value: "llama-3-70b-instruct"         # ← update with your deployed model

      # Groq — FALLBACK LLM
      - key: GROQ_API_KEY
        value: ""           # ← set in DO dashboard
        type: SECRET

# =============================================================================
# Databases (optional — attach a DO Managed Postgres)
# Uncomment this block if you want DO to manage the DB for you.
# It auto-injects DATABASE_URL into the service above.
# =============================================================================
# databases:
#   - name: opsgpt-db
#     engine: PG
#     version: "15"
#     size: db-s-1vcpu-1gb
#     num_nodes: 1